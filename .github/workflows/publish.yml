name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (skip actual publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit lock file changes
        run: |
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: sync package-lock.json"

      - name: Bump Version
        run: 'npm version ${{ inputs.version }} -m "release: v%s"'

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Commit & Tag
        if: ${{ !inputs.dry-run }}
        run: git push origin master --follow-tags

      - name: GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: true

      - name: Dry Run Summary
        if: ${{ inputs.dry-run }}
        run: |
          echo "## Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "Version would bump: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Package built and validated successfully." >> $GITHUB_STEP_SUMMARY
